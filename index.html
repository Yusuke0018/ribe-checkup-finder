      function getNextQuestion(answers) {
        const { q1, q2, q3, q4 } = answers;
        if (!q1) return "q1";
        if (!q2) {
          if (q1 === "company") return "q2_company";
          return "q2_age";
        }
        if (q1 === "company") return null;
        if (!q3) {
          if (q1 === "self")
            return q2 === "young" ? "q3_self_young" : "q3_self_over40";
          return q2 === "young" ? "q3_thorough_young" : "q3_thorough_over40";
        }
        if (q3 === "endoscope" && !q4) return "q4_endoscope";
        return null;
      }

      function getResult(answers) {
        const { q1, q2, q3, q4 } = answers;
        if (q1 === "company") {
          if (q2 === "minimal") return "kensinA";
          if (q2 === "standard") return "kensinB";
          if (q2 === "detailed") return "kensinC";
        }
        if (q3 === "basic") return "kensinB";
        if (q3 === "lifestyle") return "kensinC";
        if (q3 === "endoscope") {
          if (q4 === "gastro") return "dockA";
          if (q4 === "both") return "dockB";
          if (q4 === "sameday") return "endoscopy";
        }
        return "kensinB";
      }

      function getTotalSteps(answers) {
        const { q1, q3 } = answers;
        if (q1 === "company") return 2;
        if (q3 === "endoscope") return 4;
        if (q3) return 3;
        return 3;
      }

      function getCurrentStep(answers) {
        if (!answers.q1) return 1;
        if (!answers.q2) return 2;
        if (answers.q1 === "company") return 2;
        if (!answers.q3) return 3;
        if (answers.q3 === "endoscope" && !answers.q4) return 4;
        return 4;
      }

      const S = {

        progressBar: {

          marginBottom: "28px",
          padding: "0 4px",
        },
        progressDot: function (active, done) {

            flex: 1,
            height: "4px",
            borderRadius: "4px",
            background: done
              ? "#2E6DAF"

          color: "#1a2a3a",
          marginBottom: "20px",
          lineHeight: 1.5,

            transition: "all .2s ease",
            textAlign: "left",
            transform: h ? "translateY(-1px)" : "none",

          };
        },
        optIcon: {
          fontSize: "26px",
          flexShrink: 0,
          width: "44px",
          height: "44px",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          borderRadius: "12px",
          background: "#f0f4f8",
        },
        optLabel: {
          fontSize: "15px",
          fontWeight: 600,
          color: "#1a2a3a",
          lineHeight: 1.4,
        },
        optSub: {
          fontSize: "12px",
          color: "#8899aa",
          marginTop: "2px",

          boxShadow:

        resHead: function (c) {

            color: "#fff",

        },
        resBody: { padding: "24px" },
        secTitle: {
          fontSize: "13px",
          fontWeight: 700,
          color: "#2E6DAF",
          marginBottom: "8px",
          display: "flex",
          alignItems: "center",
          gap: "6px",
        },
        resItem: {
          fontSize: "13px",
          color: "#4a5568",
          padding: "6px 0 6px 20px",
          position: "relative",

        bestBox: {
          background: "linear-gradient(135deg,#f0f6fc,#e8f1fa)",

        ctaBtn: {

          padding: "16px",

          fontWeight: 700,

          transition: "all .2s ease",

          padding: "16px",
          marginTop: "16px",
          border: "2px solid #e8eef4",
          borderRadius: "14px",
          background: "#fff",
          color: "#4a5568",
          fontSize: "14px",
          fontWeight: 600,
          cursor: "pointer",
          transition: "all .2s ease",
        },
        fade: { animation: "fadeSlideIn .35s ease forwards" },
      };

      function Opt({ option, onClick }) {
        const [h, setH] = useState(false);
        return (
          <button
            style={S.optBtn(h)}
            onMouseEnter={() => setH(true)}
            onMouseLeave={() => setH(false)}
            onClick={() => onClick(option.value)}
          >
            <div style={S.optIcon}>{option.icon}</div>
            <div>
              <div style={S.optLabel}>{option.label}</div>
              {option.sublabel && <div style={S.optSub}>{option.sublabel}</div>}
            </div>
          </button>
        );
      }

      function QView({ qd, onSelect, step, total }) {
        return (
          <div key={qd.question} style={S.fade}>
            <div style={S.progressBar}>
              {Array.from({ length: total }, (_, i) => (
                <div
                  key={i}
                  style={S.progressDot(i + 1 === step, i + 1 < step)}
                />
              ))}
            </div>
            <div style={S.card}>
              <div style={S.qText}>
                <span
                  style={{
                    color: "#2E6DAF",
                    marginRight: "8px",
                    fontSize: "14px",
                  }}
                >
                  Q{step}
                </span>
                {qd.question}
              </div>
              {qd.options.map((o) => (
                <Opt key={o.value} option={o} onClick={onSelect} />
              ))}
            </div>
          </div>
        );
      }

        const c = COURSES[courseKey];

          <div style={S.fade}>
            <div style={{ textAlign: "center", marginBottom: "20px" }}>
              <div
                style={{
                  fontSize: "13px",
                  color: "#6b7c8d",
                  fontWeight: 600,
                  letterSpacing: ".05em",
                }}
              >
                あなたにおすすめの健診は…
              </div>
            </div>
            <div style={S.resCard}>
              <div style={S.resHead(c.color)}>
                <div style={{ fontSize: "40px", marginBottom: "12px" }}>
                  {c.icon}
                </div>
                <div
                  style={{
                    fontSize: "24px",
                    fontWeight: 800,
                    marginBottom: "4px",

                  <div style={S.secTitle}>✅ 含まれる検査</div>

                    <div key={i} style={S.resItem}>

                {c.notIncludes && (
                  <div style={{ marginBottom: "16px" }}>
                    <div
                      style={Object.assign({}, S.secTitle, {
                        color: "#a0aab4",
                      })}
                    >
                      — 含まれない検査
                    </div>
                    {c.notIncludes.map((it, i) => (
                      <div
                        key={i}
                        style={Object.assign({}, S.resItem, {
                          color: "#a0aab4",
                        })}
                      >
                        <span style={{ position: "absolute", left: 0 }}>
                          ・
                        </span>
                        {it}
                      </div>
                    ))}
                  </div>
                )}
                <div style={S.bestBox}>
                  <div
                    style={{
                      fontSize: "13px",
                      color: "#2E6DAF",
                      fontWeight: 600,
                      lineHeight: 1.6,
                    }}
                  >
                    💡 {c.bestFor}
                  </div>
                </div>
                <button
                  style={S.ctaBtn}
                  onMouseEnter={(e) => {
                    e.target.style.opacity = "0.9";
                  }}
                  onMouseLeave={(e) => {
                    e.target.style.opacity = "1";
                  }}
                  onClick={() =>
                    window.open(
                      "https://libe-clinic-osaka.com/reserve_online",
                      "_blank",
                    )
                  }
                >
                  この健診を予約する →
                </button>
                <button
                  style={S.retryBtn}
                  onMouseEnter={(e) => {
                    e.target.style.borderColor = "#2E6DAF";
                    e.target.style.color = "#2E6DAF";
                  }}
                  onMouseLeave={(e) => {
                    e.target.style.borderColor = "#e8eef4";
                    e.target.style.color = "#4a5568";
                  }}
                  onClick={onRetry}
                >
                  もう一度やり直す
                </button>
              </div>
            </div>
          </div>
        );
      }

      function App() {
        const [answers, setAnswers] = useState({});
        const [phase, setPhase] = useState("question");
        const [result, setResult] = useState(null);
        const [animKey, setAnimKey] = useState(0);

        const handleSelect = (value) => {
          const next = Object.assign({}, answers);
          const cur = getNextQuestion(answers);
          if (cur === "q1") next.q1 = value;
          else if (cur && cur.startsWith("q2")) next.q2 = value;
          else if (cur && cur.startsWith("q3")) next.q3 = value;
          else if (cur && cur.startsWith("q4")) next.q4 = value;
          setAnswers(next);
          setAnimKey((k) => k + 1);
          if (!getNextQuestion(next)) {
            setResult(getResult(next));
            setTimeout(() => setPhase("result"), 150);
          }
        };

        const handleRetry = () => {
          setAnswers({});
          setPhase("question");
          setResult(null);
          setAnimKey((k) => k + 1);
        };

        const curQ = getNextQuestion(answers);
        const qd = curQ ? QUESTIONS[curQ] : null;

        return (
          <div style={S.wrapper}>
            <div style={S.container}>
              <div style={S.header}>
                <div style={S.badge}>リベ大クリニック</div>
                <h1 style={S.title}>
                  あなたにピッタリの
                  <br />
                  健康診断を見つけよう
                </h1>
                <p style={S.subtitle}>
                  {phase === "question"
                    ? "かんたんな質問に答えるだけで、おすすめの健診コースがわかります"
                    : "あなたの回答をもとに、最適なコースを選びました"}
                </p>
              </div>
              <div key={animKey}>
                {phase === "question" && qd && (
                  <QView
                    qd={qd}
                    onSelect={handleSelect}
                    step={getCurrentStep(answers)}
                    total={getTotalSteps(answers)}
                  />
                )}
                {phase === "result" && result && (
                  <RView courseKey={result} onRetry={handleRetry} />
                )}
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
